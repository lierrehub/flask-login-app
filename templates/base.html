<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">用户管理系统</div>
        <div class="nav-menu">
            {% if session.get('username') %}
                {% if session.get('avatar') %}
                <img src="{{ url_for('static', filename='uploads/' + session['avatar']) }}" alt="头像" class="nav-avatar">
                {% endif %}
                <span class="nav-item">欢迎，{{ session['username'] }}</span>
                <a class="nav-link" href="/profile">个人中心</a>
                <a class="nav-link" href="/upload">上传头像</a>
                <form class="logout-form" method="post" action="/logout">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <button class="nav-link logout-btn" type="submit">退出</button>
                </form>
            {% else %}
                <a class="nav-link" href="/login">登录</a>
                <a class="nav-link" href="/register">注册</a>
            {% endif %}
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
