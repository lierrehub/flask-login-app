{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2 class="card-title">上传头像</h2>
    {% if message %}
        <div class="alert {% if file_url %}alert-success{% else %}alert-error{% endif %}">{{ message }}</div>
    {% endif %}
    <form class="form" method="post" action="/upload" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label class="form-label" for="file">选择图片文件</label>
            <input class="form-input" type="file" id="file" name="file" required>
        </div>
        <button class="btn btn-primary" type="submit">上传</button>
    </form>
    {% if file_url %}
    <div style="margin-top: 24px; text-align: center;">
        <h3 class="card-subtitle">预览</h3>
        <img src="{{ file_url }}" alt="头像预览" style="max-width: 200px; max-height: 200px; border-radius: 8px; border: 2px solid #f0f0f0;">
        <p style="margin-top: 8px; font-size: 12px; color: #888;">{{ filename }}</p>
        <p style="margin-top: 4px;"><a href="{{ file_url }}" target="_blank" style="color: #667eea; font-size: 13px;">打开文件链接</a></p>
    </div>
    {% endif %}
</div>
{% endblock %}
