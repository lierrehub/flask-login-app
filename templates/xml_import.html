{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2 class="card-title">XML 数据导入</h2>
    <form class="form" method="post" action="/xml-import">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label class="form-label" for="xml_data">请输入 XML 数据</label>
            <textarea class="form-input form-textarea" id="xml_data" name="xml_data" rows="12" placeholder="粘贴 XML 内容..." required></textarea>
        </div>
        <button class="btn btn-primary" type="submit">导入</button>
    </form>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    {% if result %}
    <h3 class="card-subtitle" style="margin-top: 20px;">解析结果</h3>
    <div class="console">
        <div class="console-header">JSON 输出</div>
        <pre class="console-output">{{ result }}</pre>
    </div>
    {% endif %}
</div>
{% endblock %}
